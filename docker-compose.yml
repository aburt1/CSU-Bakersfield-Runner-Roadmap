services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.csub-admissions.rule=Host(`${DOMAIN:-csub-admissions-roadmap.bigpapaburt.com}`)
      - traefik.http.routers.csub-admissions.entrypoints=https
      - traefik.http.routers.csub-admissions.tls=true
      - traefik.http.routers.csub-admissions.tls.certresolver=letsencrypt
      - traefik.http.services.csub-admissions.loadbalancer.server.port=3001
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-csub_admissions}
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-random-string}
      - ADMIN_DEFAULT_EMAIL=${ADMIN_DEFAULT_EMAIL:-admin@csub.edu}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-csub_admissions}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
